# .goreleaser.yaml
version: 2

project_name: nexus-v

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd
    binary: nexus-v

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: nexus-v
    repository:
      owner: billy-kidd-dev
      name: homebrew-nexusv
    directory: Formula
    homepage: "https://github.com/billy-kidd-dev/nexus-v"
    description: "A modern, zero-install VS Code extension scaffolder."
    license: "MIT"
    install: |
      bin.install "nexus-v"

scoops:
  - name: nexus-v
    repository:
      owner: billy-kidd-dev
      name: scoop-bucket
    homepage: "https://github.com/billy-kidd-dev/nexus-v"
    description: "A modern, zero-install VS Code extension scaffolder."
    license: "MIT"


