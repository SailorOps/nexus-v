name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true
      - name: Lint
        env:
          GOTOOLCHAIN: auto
        run: go vet ./...
      - name: Test
        env:
          GOTOOLCHAIN: auto
        run: go test ./...
