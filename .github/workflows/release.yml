name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          mkdir dist
          GOOS=linux GOARCH=amd64 go build -o dist/nexus-v-linux-amd64 ./cmd/nexus-v.go
          GOOS=linux GOARCH=arm64 go build -o dist/nexus-v-linux-arm64 ./cmd/nexus-v.go
          GOOS=darwin GOARCH=amd64 go build -o dist/nexus-v-darwin-amd64 ./cmd/nexus-v.go
          GOOS=darwin GOARCH=arm64 go build -o dist/nexus-v-darwin-arm64 ./cmd/nexus-v.go
          GOOS=windows GOARCH=amd64 go build -o dist/nexus-v-windows-amd64.exe ./cmd/nexus-v.go

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
