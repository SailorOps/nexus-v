name: ⚓ Auto-Merge Trusted PRs

on:
  pull_request:
    types: [opened, reopened, synchronized, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-handle:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'billy' ||
      github.event.pull_request.user.login == 'sailorops-bot' ||
      contains(github.event.pull_request.labels.*.name, 'brand-sync')
    steps:
      - name: Auto-approve and Enable Auto-merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
        run: |
          gh pr review "$PR_URL" --approve || echo "Could not approve"
          gh pr merge "$PR_URL" --auto --merge || echo "Could not enable auto-merge"
